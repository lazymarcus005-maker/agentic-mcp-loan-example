services:
  # ============================================================================
  # SQL Server - hosts LoanDataDB (restored from database/LoanDataDB.bak)
  # ============================================================================
  sqlserver:
    build:
      context: ./database
      dockerfile: Dockerfile.mssql
    container_name: loan-sql
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - SA_PASSWORD=P@ssw0rd!23
    ports:
      - "1433:1433"
    networks:
      - agentic-network

  # ============================================================================
  # MSSQL MCP Server (Python) - exposes read-only LOAN query tools over MCP
  # ============================================================================
  mcp-mssql-v1:
    build:
      context: ./mcp_mssql
      dockerfile: Dockerfile
    container_name: mcp-mssql-v1
    restart: unless-stopped
    environment:
      MSSQL_SERVER: "sqlserver,1433"
      MSSQL_DATABASE: LoanDataDB
      MSSQL_USER: sa
      MSSQL_PASSWORD: P@ssw0rd!23
      MSSQL_DRIVER: "ODBC Driver 18 for SQL Server"
      MSSQL_ENCRYPT: "yes"
      MSSQL_TRUST_SERVER_CERTIFICATE: "yes"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8080"
    depends_on:
      - sqlserver
    networks:
      - agentic-network

  # ============================================================================
  # Agentic AI (Python) - LOAN Q&A chat service, bridges LLM <-> mcp-mssql-v1
  # Requires ./agenticai_v2/.env (copy from .env.example and fill in API keys)
  # ============================================================================
  agenticai-v2:
    build:
      context: ./agenticai_v2
      dockerfile: Dockerfile
    container_name: agenticai-v2
    restart: unless-stopped
    env_file:
      - ./agenticai_v2/.env
    environment:
      MCP_MSSQL_URL: "http://mcp-mssql-v1:8080/mcp"
      APP_HOST: "0.0.0.0"
      APP_PORT: "80"
    ports:
      - "5082:80"
    depends_on:
      - mcp-mssql-v1
    networks:
      - agentic-network

networks:
  agentic-network:
    driver: bridge
