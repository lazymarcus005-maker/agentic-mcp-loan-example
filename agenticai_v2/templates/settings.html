<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ตั้งค่า - ChatLoan</title>
  <link rel="stylesheet" href="/static/css/styles.css?v={{ static_version }}" />
</head>
<body class="page-scroll">
  <div class="settings-page">
    <a href="/" class="back-link">&larr; กลับไปหน้าแชท</a>
    <h1>Settings</h1>

    <div class="settings-card">
      <h2>LLM Provider / Model</h2>
      <div class="field">
        <label for="provider-select">Provider</label>
        <select id="provider-select">
          <option value="openrouter">openrouter</option>
          <option value="gemini">gemini</option>
          <option value="openai">openai</option>
          <option value="openai_compatible">openai_compatible</option>
        </select>
      </div>
      <div class="field">
        <label for="model-input">Model</label>
        <input id="model-input" type="text" placeholder="เช่น openai/gpt-4o-mini" />
      </div>
      <div class="field">
        <label for="api-key-input">API Key <span id="api-key-badge" class="field-badge"></span></label>
        <input id="api-key-input" type="password" autocomplete="off" placeholder="" />
      </div>
      <div class="field" id="base-url-field">
        <label for="base-url-input">Base URL (สำหรับ openai_compatible)</label>
        <input id="base-url-input" type="text" placeholder="https://..." />
      </div>
      <div class="button-row">
        <button id="save-settings-btn" class="save-btn">บันทึก</button>
        <button type="button" id="how-to-get-key-btn" class="how-to-btn"></button>
      </div>
      <div id="settings-status" class="status-text"></div>
    </div>

    <div class="settings-card">
      <h2>MCP Connection</h2>
      <div id="mcp-name" class="status-text"></div>
      <div id="mcp-url" class="status-text"></div>
      <button id="fetch-tools-btn" class="fetch-btn">แสดง tools</button>
      <div id="tool-list" class="tool-list"></div>
    </div>
  </div>

  <div id="api-key-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button type="button" id="modal-close-btn" class="modal-close" aria-label="ปิด">✕</button>
      <h3 id="modal-title"></h3>
      <img id="modal-image" class="modal-image" src="" alt="วิธีขอ API Key" />
    </div>
  </div>

  <script src="/static/js/settings.js?v={{ static_version }}"></script>
</body>
</html>
