<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatLoan</title>
  <link rel="stylesheet" href="/static/css/styles.css?v={{ static_version }}" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo-row">
          <span class="logo label">💬 ChatLoan</span>
          <button id="sidebar-toggle" class="icon-btn" title="ยุบ/ขยายเมนู">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <line x1="9" y1="4" x2="9" y2="20"></line>
            </svg>
          </button>
        </div>
        <button id="new-chat-btn" class="new-chat-btn">
          <span class="icon">+</span><span class="label">แชทใหม่</span>
        </button>
        <div class="search-wrap">
          <input id="search-input" class="search-input" type="text" placeholder="ค้นหาแชท" />
        </div>
        <div class="session-section-label">แชท</div>
      </div>

      <div class="session-list-wrap">
        <div id="session-list" class="session-list"></div>
      </div>

      <div class="sidebar-bottom">
        <a href="/settings" class="sidebar-settings-link">
          <span class="icon">⚙️</span><span class="label">ตั้งค่า</span>
        </a>
      </div>
    </aside>

    <main class="chat-main" id="chat-main">
      <div class="greeting" id="greeting">
        <h1>มีอะไรให้ช่วยเกี่ยวกับสินเชื่อวันนี้?</h1>
      </div>

      <div id="messages" class="messages"></div>

      <div class="composer">
        <form id="chat-form" class="chat-form">
          <div class="emoji-wrap">
            <button type="button" id="emoji-btn" class="icon-circle-btn" title="Emoji">😊</button>
            <div id="emoji-panel" class="emoji-panel hidden"></div>
          </div>
          <textarea id="chat-input" class="chat-input" rows="1" placeholder="พิมพ์คำถามเกี่ยวกับสินเชื่อ..."></textarea>
          <button type="submit" id="send-btn" class="icon-circle-btn send-btn" title="ส่ง">↑</button>
        </form>
        <div class="suggestion-chips" id="suggestion-chips">
          <button type="button" class="chip" data-text="ขอสรุปพอร์ตสินเชื่อทั้งหมดแยกตามผลิตภัณฑ์">📊 สรุปพอร์ตสินเชื่อ</button>
          <button type="button" class="chip" data-text="ลูกหนี้ที่ค้างชำระตอนนี้มีใครบ้าง เรียงตามจำนวนวันค้าง">⏰ ลูกหนี้ค้างชำระ</button>
          <button type="button" class="chip" data-text="ช่วยค้นหาข้อมูลลูกค้าให้หน่อย">🔍 ค้นหาลูกค้า</button>
        </div>
        <div class="disclaimer">ข้อมูลที่ตอบ เป็นข้อมูลทดสอบเท่านั้น</div>
      </div>
    </main>
  </div>

  <script src="/static/js/chat.js?v={{ static_version }}"></script>
</body>
</html>
